services:
  - type: web
    name: bible3dsphere-api
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GIT_LFS_SKIP_SMUDGE
        value: "1"
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: bible3dsphere-db
          property: connectionString
    healthCheckPath: /api/layout
    autoDeploy: true

databases:
  - name: bible3dsphere-db
    databaseName: bible_sphere
    user: bible_sphere
    plan: free  # Render 免费 PostgreSQL（1GB 存储，永久保留）
